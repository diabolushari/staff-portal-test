syntax = "proto3";

// ✅ Package must match Java server package
package com.kseb.consumerservice.grpc.consumers;

option php_namespace = "Proto\\Consumers";
option php_metadata_namespace = "GPBMetadata";

// Imports for types
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";

// --------- MESSAGES ---------

message OfficeProto {
  int32 office_id = 1;
  int32 office_code = 2;
  string office_description = 3;
  int32 office_type_id = 4;
  int32 parent_office_id = 5;
  int32 location_id = 6;
  int32 office_address_id = 7;
  google.protobuf.Struct contact_folio = 8;
  google.protobuf.Timestamp effective_start = 9;
  google.protobuf.Timestamp effective_end = 10;
  bool is_current = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
  int32 created_by = 14;
  int32 updated_by = 15;
}

message CreateOfficeRequest {
  int32 office_code = 1;
  string office_description = 2;
  int32 office_type_id = 3;
  int32 parent_office_id = 4;
  int32 location_id = 5;
  int32 office_address_id = 6;
  google.protobuf.Struct contact_folio = 7;
  google.protobuf.Timestamp effective_start = 8;
  google.protobuf.Timestamp effective_end = 9;
  bool is_current = 10;
  int32 created_by = 11;
}

message UpdateOfficeRequest {
  int32 office_id = 1;
  int32 office_code = 2;
  string office_description = 3;
  int32 office_type_id = 4;
  int32 parent_office_id = 5;
  int32 location_id = 6;
  int32 office_address_id = 7;
  google.protobuf.Struct contact_folio = 8;
  google.protobuf.Timestamp effective_start = 9;
  google.protobuf.Timestamp effective_end = 10;
  bool is_current = 11;
  int32 updated_by = 12;
}

message OfficeIdRequest {
  int32 office_id = 1;
}

message OfficeResponse {
  OfficeProto office = 1;
}

message OfficeListResponse {
  repeated OfficeProto offices = 1;
}

// --------- SERVICE ---------

service OfficeService {
  rpc CreateOffice (CreateOfficeRequest) returns (OfficeResponse);
  rpc GetOfficeById (OfficeIdRequest) returns (OfficeResponse);
  rpc ListOffices (google.protobuf.Empty) returns (OfficeListResponse);
  rpc UpdateOffice (UpdateOfficeRequest) returns (OfficeResponse);
  rpc DeleteOffice (OfficeIdRequest) returns (google.protobuf.Empty);
}
