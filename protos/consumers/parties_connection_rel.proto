syntax = "proto3";

package com.kseb.consumerservice.proto.consumers;


option php_namespace = "Proto\\Consumers";
option php_metadata_namespace = "GPBMetadata";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

message PartiesConnectionRelMessage {
  int32 version_id = 1;
  int32 party_id = 2;
  int32 connection_id = 3;
  google.protobuf.Timestamp effective_start = 4;
  optional google.protobuf.Timestamp effective_end = 5;
  bool is_active = 6;
  optional int32 created_by = 7;
  optional int32 updated_by = 8;
  optional google.protobuf.Timestamp deleted_ts = 9;
  optional int32 deleted_by = 10;
}

// Request messages expected by Java
message CreatePartiesConnectionRelRequest {
  int32 party_id = 1;
  int32 connection_id = 2;
  google.protobuf.Timestamp effective_start = 3;
  optional google.protobuf.Timestamp effective_end = 4;
  bool is_active = 5;
  int32 created_by = 6;
}

message UpdatePartiesConnectionRelRequest {
  int32 version_id = 1;
  int32 party_id = 2;
  int32 connection_id = 3;
  google.protobuf.Timestamp effective_start = 4;
  optional google.protobuf.Timestamp effective_end = 5;
  bool is_active = 6;
  int32 updated_by = 7;
}

message GetPartiesConnectionRelRequest {
  int32 version_id = 1;
}

message DeletePartiesConnectionRelRequest {
  int32 version_id = 1;
  int32 deleted_by = 2;
}

message ListPartiesConnectionRelResponse {
  repeated PartiesConnectionRelMessage items = 1;
}

service PartiesConnectionRelService {
  rpc CreatePartiesConnectionRel(CreatePartiesConnectionRelRequest)
      returns (PartiesConnectionRelMessage);

  rpc GetPartiesConnectionRel(GetPartiesConnectionRelRequest)
      returns (PartiesConnectionRelMessage);

  rpc ListPartiesConnectionRel(google.protobuf.Empty)
      returns (ListPartiesConnectionRelResponse);

  rpc UpdatePartiesConnectionRel(UpdatePartiesConnectionRelRequest)
      returns (PartiesConnectionRelMessage);

  rpc DeletePartiesConnectionRel(DeletePartiesConnectionRelRequest)
      returns (google.protobuf.Empty);
}
