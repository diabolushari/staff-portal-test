syntax = "proto3";

package com.kseb.consumerservice.grpc.consumers;

option java_multiple_files = true;
option java_package = "com.kseb.consumerservice.grpc.consumers";
option java_outer_classname = "PartyProto";
option php_namespace = "Proto\\Consumers";
option php_metadata_namespace = "GPBMetadata";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

message PartyMessage {
  int64 version_id = 1;
  int32 party_id = 2;
  int32 party_code = 3;
  string party_legacy_code = 4;
  string name = 5;
  int64 party_type_id = 6;
  int64 status_id = 7;
  google.protobuf.Timestamp effective_start = 8;
  google.protobuf.Timestamp effective_end = 9;
  bool is_current = 10;
  int32 created_by = 11;
  int32 updated_by = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}

// Create Party request
message PartyCreateRequest {
  optional int32 party_id = 1;
  optional int32 party_code = 2;
  string party_legacy_code = 3;
  string name = 4;
  optional int64 party_type_id = 5;
  optional int64 status_id = 6;
  google.protobuf.Timestamp effective_start = 7;
  google.protobuf.Timestamp effective_end = 8;
  bool is_current = 9;
  int32 created_by = 10;
}

// Update Party request
message PartyUpdateRequest {
  int64 version_id = 1;
  optional int32 party_id = 2;
  optional int32 party_code = 3;
  string party_legacy_code = 4;
  string name = 5;
  optional int64 party_type_id = 6;
  optional int64 status_id = 7;
  google.protobuf.Timestamp effective_start = 8;
  google.protobuf.Timestamp effective_end = 9;
  bool is_current = 10;
  int32 updated_by = 11;
}

// Get/Delete by ID
message PartyIdRequest {
  int64 version_id = 1;
}

// Single response
message PartyResponse {
  PartyMessage party = 1;
}

// List response
message PartyListResponse {
  repeated PartyMessage parties = 1;
}

// gRPC service
service PartyService {
  rpc CreateParty(PartyCreateRequest) returns (PartyResponse);
  rpc UpdateParty(PartyUpdateRequest) returns (PartyResponse);
  rpc GetPartyById(PartyIdRequest) returns (PartyResponse);
  rpc DeleteParty(PartyIdRequest) returns (google.protobuf.Empty);
  rpc ListParties(google.protobuf.Empty) returns (PartyListResponse);
}
