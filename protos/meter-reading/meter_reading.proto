syntax = "proto3";

package com.kseb.consumerservice.proto.meter_reading;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "parameters/parameter-value.proto";
import "metering/meter.proto";
import "meter-reading/metering_profile_parameters.proto";


option php_namespace = "Proto\\Metering";
option php_metadata_namespace = "GPBMetadata";

option java_package = "com.kseb.consumerservice.proto.meter_reading";
option java_multiple_files = true;
option java_outer_classname = "MeterReadingsProto";



message ReadingValueMessage{
  int64 meter_reading_values_id = 1;
  int64 parameter_id = 2;
  int64 meter_reading_id = 3;
  int32 meter_id = 4;
  com.kseb.consumerservice.proto.metering.MeterResponse meter = 5;
  int64 timezone_id = 6;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto timezone = 7;
  double initial_reading = 8;
  double final_reading = 9;
  double difference = 10;
  double value = 11;
  int32 created_by = 12;
  int32 updated_by = 13;
  bool is_active = 14;
  com.kseb.consumerservice.proto.meter_reading.MeteringProfileParameterMessage parameter = 15;
}

message CreateMeterReadingValues {
  int64 parameter_id = 1;
  int32 meter_id = 2;
  int64 timezone_id = 3;
  double initial_reading = 4;
  double final_reading = 5;
  double difference = 6;
  double value = 7;
  int32 created_by = 8;
}

// ----------- MESSAGE ------------
message MeterReadingsMessage {
  int64 meter_reading_detail_id = 1;
  int64 connection_id = 2;

  double normal_pf = 3;
  double peak_pf = 4;
  double offpeak_pf = 5;
  double average_power_factor = 6;

  bool single_reading = 7;
  bool multiple_reading = 8;
  int64 anomaly_id = 9;
  optional parameters.ParameterValueProto anomaly = 10;

  string metering_date = 11;
  string reading_start_date = 12;
  string reading_end_date = 13;

  int64 meter_health_id = 14;
  optional parameters.ParameterValueProto meter_health = 15;

  int64 ctpt_health_id = 16;
  optional parameters.ParameterValueProto ctpt_health = 17;

  double voltage_r = 18;
  double voltage_y = 19;
  double voltage_b = 20;

  double current_r = 21;
  double current_y = 22;
  double current_b = 23;

  string remarks = 24;

  int32 created_by = 25;
  int32 updated_by = 26;
  bool is_active = 27;
}

// ----------- REQUEST/RESPONSE ----------

message UpdateMeterReadingsRequest  { MeterReadingsMessage detail = 1; }
message GetMeterReadingsRequest     { int64 meter_reading_detail_id = 1;
optional int64 meter_id = 2; }
message DeleteMeterReadingsRequest  { int64 meter_reading_detail_id = 1; }


message GetMeterReadingResponse {
  MeterReadingsMessage reading = 1;
  repeated ReadingValueMessage values = 2;
}

message ListMeterReadingsRequest {
  int32 page = 1;
  int32 page_size = 2;
  int64 connection_id = 3;
  string search = 4;
}
message CreateMeterReadingsRequest {
  int64 connection_id = 1;
  double normal_pf = 2;
  double peak_pf = 3;
  double offpeak_pf = 4;
  double average_power_factor = 5;
  bool single_reading = 6;
  bool multiple_reading = 7;
  int64 anomaly_id = 8;
  string metering_date = 9;
  string reading_start_date = 10;
  string reading_end_date = 11;
  int64 meter_health_id = 12;
  int64 ctpt_health_id = 13;
  double voltage_r = 14;
  double voltage_y = 15;
  double voltage_b = 16;
  double current_r = 17;
  double current_y = 18;
  double current_b = 19;
  string remarks = 20;
  int32 created_by = 21;
  bool is_active = 22;
  repeated CreateMeterReadingValues readings = 23;
}
message ListMeterReadingsResponse {
  repeated MeterReadingsMessage details = 1;
}


// ----------- SERVICE ------------
service MeterReadingsService {
  rpc CreateMeterReadings (CreateMeterReadingsRequest) returns (MeterReadingsMessage);
  rpc UpdateMeterReadings (UpdateMeterReadingsRequest) returns (MeterReadingsMessage);
  rpc GetMeterReadings    (GetMeterReadingsRequest)    returns (GetMeterReadingResponse);
  rpc DeleteMeterReadings (DeleteMeterReadingsRequest) returns (google.protobuf.Empty);
  rpc ListMeterReadings   (ListMeterReadingsRequest)   returns (ListMeterReadingsResponse);
}
