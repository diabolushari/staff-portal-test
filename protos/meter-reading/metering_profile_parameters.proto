syntax = "proto3";

package com.kseb.consumerservice.proto.meter_reading;

option php_namespace = "Proto\\Metering";
option php_metadata_namespace = "GPBMetadata";

option java_multiple_files = true;
option java_package = "com.kseb.consumerservice.proto.meter_reading";
option java_outer_classname = "MeteringProfileParametersProto";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "parameters/parameter-value.proto";

// ----------- ENTITY MESSAGE ------------
message MeteringProfileParameterMessage {
  int64 version_id = 1;                      
  int64 profile_id = 2;              
  com.kseb.consumerservice.proto.parameters.ParameterValueProto profile = 3; 

  string name = 4;
  string display_name = 5;
  google.protobuf.Timestamp effective_start_date = 6;
  google.protobuf.Timestamp effective_end_date = 7;
  int32 created_by = 8;
  int32 updated_by = 9;
  bool is_active = 10;
  int64 meter_parameter_id = 11;
}

// ----------- REQUEST/RESPONSE MESSAGES ----------

// Create
message CreateMeteringProfileParameterRequest {
  int64 profile_id = 1;              
  string name = 2;
  string display_name = 3;
  int32 created_by = 4;
}
message CreateMeteringProfileParameterResponse {
  MeteringProfileParameterMessage profile = 1;
}

message UpdateMeteringProfileParameterRequest {
  int64 version_id = 1;                      
  int64 profile_id = 2;              
  string name = 3;
  string display_name = 4;
  int32 updated_by = 5;
}
message UpdateMeteringProfileParameterResponse {
  MeteringProfileParameterMessage profile = 1;
}

message GetMeteringProfileParameterRequest {
  int64 id = 1;                      
}
message GetMeteringProfileParameterResponse {
  MeteringProfileParameterMessage profile = 1;
}

message DeleteMeteringProfileParameterRequest {
  int64 id = 1;                      
}
message DeleteMeteringProfileParameterResponse {
  bool success = 1;
  string message = 2;
}

message ListMeteringProfileParametersRequest {
  int32 page = 1;
  int32 page_size = 2;
  string search = 3;
  int64 profile_id = 4;
}
message ListMeteringProfileParametersResponse {
  repeated MeteringProfileParameterMessage profiles = 1;
}

// ----------- SERVICE ------------
service MeteringProfileParameterService {
  rpc CreateMeteringProfileParameter (CreateMeteringProfileParameterRequest) returns (CreateMeteringProfileParameterResponse);
  rpc UpdateMeteringProfileParameter (UpdateMeteringProfileParameterRequest) returns (UpdateMeteringProfileParameterResponse);
  rpc GetMeteringProfileParameter    (GetMeteringProfileParameterRequest)    returns (GetMeteringProfileParameterResponse);
  rpc DeleteMeteringProfileParameter (DeleteMeteringProfileParameterRequest) returns (DeleteMeteringProfileParameterResponse);
  rpc ListMeteringProfileParameters  (ListMeteringProfileParametersRequest)  returns (ListMeteringProfileParametersResponse);
}
