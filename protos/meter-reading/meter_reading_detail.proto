syntax = "proto3";

package com.kseb.consumerservice.proto.meter_reading;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "parameters/parameter-value.proto";

option php_namespace = "Proto\\Consumers";
option php_metadata_namespace = "GPBMetadata";

option java_package = "com.kseb.consumerservice.proto.meter_reading";
option java_multiple_files = true;
option java_outer_classname = "MeterReadingDetailProto";

// ----------- MESSAGE ------------
message MeterReadingDetailMessage {
  int64 meter_reading_detail_id = 1;
  int64 connection_id = 2;

  double normal_pf = 3;
  double peak_pf = 4;
  double offpeak_pf = 5;
  double average_power_factor = 6;

  bool single_reading = 7;
  bool multiple_reading = 8;
  int64 anomaly_id = 9;
  optional parameters.ParameterValueProto anomaly = 10;

  string metering_date = 11;
  string reading_start_date = 12;
  string reading_end_date = 13;

  int64 meter_health_id = 14;
  optional parameters.ParameterValueProto meter_health = 15;

  int64 ctpt_health_id = 16;
  optional parameters.ParameterValueProto ctpt_health = 17;

  double voltage_r = 18;
  double voltage_y = 19;
  double voltage_b = 20;

  double current_r = 21;
  double current_y = 22;
  double current_b = 23;

  string remarks = 24;

  int32 created_by = 25;
  int32 updated_by = 26;
  bool is_active = 27;
}

// ----------- REQUEST/RESPONSE ----------
message CreateMeterReadingDetailRequest  { MeterReadingDetailMessage detail = 1; }
message UpdateMeterReadingDetailRequest  { MeterReadingDetailMessage detail = 1; }
message GetMeterReadingDetailRequest     { int64 meter_reading_detail_id = 1; }
message DeleteMeterReadingDetailRequest  { int64 meter_reading_detail_id = 1; }

message ListMeterReadingDetailsRequest {
  int32 page = 1;
  int32 page_size = 2;
  int64 connection_id = 3;
  string search = 4;
}

message ListMeterReadingDetailsResponse {
  repeated MeterReadingDetailMessage details = 1;
}

// ----------- SERVICE ------------
service MeterReadingDetailService {
  rpc CreateMeterReadingDetail (CreateMeterReadingDetailRequest) returns (MeterReadingDetailMessage);
  rpc UpdateMeterReadingDetail (UpdateMeterReadingDetailRequest) returns (MeterReadingDetailMessage);
  rpc GetMeterReadingDetail    (GetMeterReadingDetailRequest)    returns (MeterReadingDetailMessage);
  rpc DeleteMeterReadingDetail (DeleteMeterReadingDetailRequest) returns (google.protobuf.Empty);
  rpc ListMeterReadingDetails  (ListMeterReadingDetailsRequest)  returns (ListMeterReadingDetailsResponse);
}
