syntax = "proto3";

package com.kseb.consumerservice.proto.meter_reading;

option php_namespace = "Proto\\Metering";
option php_metadata_namespace = "GPBMetadata";

option java_multiple_files = true;
option java_package = "com.kseb.consumerservice.proto.meter_reading";
option java_outer_classname = "MeteringParameterProfilesProto";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "parameters/parameter-value.proto";

// ----------- ENTITY MESSAGE ------------
message MeteringParameterProfileMessage {
  int64 version_id = 1;                      
  int64 profile_id = 2;              
  com.kseb.consumerservice.proto.parameters.ParameterValueProto profile = 3; 

  string name = 4;
  string display_name = 5;
  google.protobuf.Timestamp effective_start_date = 6;
  google.protobuf.Timestamp effective_end_date = 7;
  int32 created_by = 8;
  int32 updated_by = 9;
  bool is_active = 10;
  int64 meter_parameter_id = 11;
}

// ----------- REQUEST/RESPONSE MESSAGES ----------

// Create
message CreateMeteringParameterProfileRequest {
  int64 profile_id = 1;              
  string name = 2;
  string display_name = 3;
  int32 created_by = 4;
}
message CreateMeteringParameterProfileResponse {
  MeteringParameterProfileMessage profile = 1;
}

message UpdateMeteringParameterProfileRequest {
  int64 version_id = 1;                      
  int64 profile_id = 2;              
  string name = 3;
  string display_name = 4;
  int32 updated_by = 5;
}
message UpdateMeteringParameterProfileResponse {
  MeteringParameterProfileMessage profile = 1;
}

message GetMeteringParameterProfileRequest {
  int64 id = 1;                      
}
message GetMeteringParameterProfileResponse {
  MeteringParameterProfileMessage profile = 1;
}

message DeleteMeteringParameterProfileRequest {
  int64 id = 1;                      
}
message DeleteMeteringParameterProfileResponse {
  bool success = 1;
  string message = 2;
}

message ListMeteringParameterProfilesRequest {
  int32 page = 1;
  int32 page_size = 2;
  string search = 3;
  int64 profile_id = 4;
}
message ListMeteringParameterProfilesResponse {
  repeated MeteringParameterProfileMessage profiles = 1;
}

// ----------- SERVICE ------------
service MeteringParameterProfileService {
  rpc CreateMeteringParameterProfile (CreateMeteringParameterProfileRequest) returns (CreateMeteringParameterProfileResponse);
  rpc UpdateMeteringParameterProfile (UpdateMeteringParameterProfileRequest) returns (UpdateMeteringParameterProfileResponse);
  rpc GetMeteringParameterProfile    (GetMeteringParameterProfileRequest)    returns (GetMeteringParameterProfileResponse);
  rpc DeleteMeteringParameterProfile (DeleteMeteringParameterProfileRequest) returns (DeleteMeteringParameterProfileResponse);
  rpc ListMeteringParameterProfiles  (ListMeteringParameterProfilesRequest)  returns (ListMeteringParameterProfilesResponse);
}
