syntax = "proto3";

package com.kseb.consumerservice.proto.metering;



option php_namespace = "Proto\\Metering";
option php_metadata_namespace = "GPBMetadata";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "parameters/parameter-value.proto";
import "metering/meter.proto";


service MeterConnectionMappingService {
  rpc CreateMeterConnectionMapping(CreateMeterConnectionMappingRequest) returns (MeterConnectionMappingResponse);
  rpc GetMeterConnectionMapping(GetMeterConnectionMappingRequest) returns (MeterConnectionMappingResponse);
  // Changed return type to list response
  rpc GetMeterConnectionMappingByConnectionId(GetMeterConnectionMappingByConnectionIdRequest) returns (ListMeterConnectionMappingsResponse);
  rpc ListMeterConnectionMappings(ListMeterConnectionMappingsRequest) returns (ListMeterConnectionMappingsResponse);
  rpc UpdateMeterConnectionMapping(UpdateMeterConnectionMappingRequest) returns (MeterConnectionMappingResponse);
  rpc UpdateMeterConnectionStatus(UpdateMeterConnectionStatusRequest)
      returns (MeterConnectionMappingResponse);
  rpc UpdateMeterConnectionChangeReason(UpdateMeterConnectionChangeReasonRequest)
      returns (MeterConnectionMappingResponse);
  rpc UpdateMeterConnectionProfile(UpdateMeterConnectionProfileRequest)
      returns (MeterConnectionMappingResponse);
  rpc DeleteMeterConnectionMapping(DeleteMeterConnectionMappingRequest) returns (google.protobuf.Empty);
}
message MeterTransformerRelFormRequest { 
  int64 ctpt_id = 1;
  optional google.protobuf.Timestamp faulty_date = 2;
  optional google.protobuf.Timestamp ctpt_energise_date = 3;
  optional google.protobuf.Timestamp ctpt_change_date = 4;
  int64 status_id = 5;
  int64 change_reason_id = 6;
  int64 created_by = 7;
  
}

message CreateMeterConnectionMappingRequest {
  int32 rel_id = 1;
  int32 meter_id = 2;
  int32 connection_id = 3;
  int32 meter_use_category = 4; // ParameterValue ID for Meter Use Category
  int32 meter_status_id = 5;
  optional google.protobuf.Timestamp faulty_date = 6;
  optional google.protobuf.Timestamp rectification_date = 7;
  optional google.protobuf.Timestamp energise_date = 8;
  optional google.protobuf.Timestamp notice_date = 9;
  optional google.protobuf.Timestamp intimation_date = 10;
  optional google.protobuf.Timestamp change_date = 11;
  optional int32 change_reason = 12;
  google.protobuf.Timestamp effective_start_ts = 13;
  optional google.protobuf.Timestamp effective_end_ts = 14;
  optional bool is_active = 15;
  optional int32 created_by = 16;
  optional int32 sort_priority = 17;
  optional bool is_meter_reading_mandatory = 18;
  repeated MeterTransformerRelFormRequest meter_transformers = 19;
  int32 timezone_type_id = 20;
  int32 profile_id = 21;
  optional float meter_mf = 22;
}

message UpdateMeterConnectionMappingRequest {
  int32 rel_id = 1;
  optional int32 meter_use_category = 2;
  optional int32 profile_id = 3;
  optional float meter_mf = 4;
  optional int32 timezone_type_id = 5;
  optional int32 sort_priority = 6;
  optional google.protobuf.Timestamp energise_date = 7;
  optional bool is_meter_reading_mandatory = 8;
  optional int32 updated_by = 9;
}


message UpdateMeterConnectionStatusRequest {
  int32 rel_id = 1;  
  optional int32 meter_status_id = 2;
  optional google.protobuf.Timestamp faulty_date = 3;
  optional google.protobuf.Timestamp notice_date = 4;
  optional google.protobuf.Timestamp intimation_date = 5;
  optional int32 updated_by = 6;
}


message UpdateMeterConnectionChangeReasonRequest {
  int32 rel_id = 1;  
  optional int32 change_reason = 2;
  optional google.protobuf.Timestamp change_date = 3;
  optional int32 updated_by = 4;
}

message UpdateMeterConnectionProfileRequest {
  int32 rel_id = 1;
  int32 profile_id = 2;                 
  optional int32 updated_by = 3;
}



message GetMeterConnectionMappingRequest {
  int32 rel_id = 1;
}

message GetMeterConnectionMappingByConnectionIdRequest {
  int32 connection_id = 1;
}

message DeleteMeterConnectionMappingRequest {
  int32 rel_id = 1;
}

message ListMeterConnectionMappingsRequest {
  int32 connection_id = 1;
}

message ListMeterConnectionMappingsResponse {
  repeated MeterConnectionMappingResponse meter_connection_mappings = 1;
}

message MeterConnectionMappingResponse {
  int32 version_id = 1;
  int32 rel_id = 2;
  int32 meter_id = 3;
  int32 connection_id = 4;
  int32 profile_id = 5;
  parameters.ParameterValueProto meter_use_category = 6;
  parameters.ParameterValueProto meter_status = 7;
  parameters.ParameterValueProto profile = 8;
  optional google.protobuf.Timestamp faulty_date = 9;
  optional google.protobuf.Timestamp rectification_date = 10;
  optional google.protobuf.Timestamp energise_date = 11;
  optional google.protobuf.Timestamp notice_date = 12;
  optional google.protobuf.Timestamp intimation_date = 13;
  optional google.protobuf.Timestamp change_date = 14;
  optional parameters.ParameterValueProto change_reason = 15;
  string effective_start_ts = 16;
  optional string effective_end_ts = 17;
  optional bool is_active = 18;
  google.protobuf.Timestamp created_ts = 19;
  optional google.protobuf.Timestamp updated_ts = 20;
  optional int32 created_by = 21;
  optional int32 updated_by = 22;
  optional int32 sort_priority = 23;
  optional bool is_meter_reading_mandatory = 24;
  optional MeterResponse meter = 25;
  optional float meter_mf = 26;
  optional bool is_current = 27;
}

