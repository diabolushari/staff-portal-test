syntax = "proto3";

package com.kseb.consumerservice.proto.metering;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "parameters/parameter-value.proto";

option php_namespace = "Proto\\Metering";
option php_metadata_namespace = "GPBMetadata";

option java_package = "com.kseb.consumerservice.proto.metering";
option java_multiple_files = true;
option java_outer_classname = "MeterConnectionMappingProto";

service MeterConnectionMappingService {
  rpc CreateMeterConnectionMapping(CreateMeterConnectionMappingRequest) returns (MeterConnectionMappingResponse);
  rpc GetMeterConnectionMapping(GetMeterConnectionMappingRequest) returns (MeterConnectionMappingResponse);
  // Changed return type to list response
  rpc GetMeterConnectionMappingByConnectionId(GetMeterConnectionMappingByConnectionIdRequest) returns (ListMeterConnectionMappingsResponse);
  rpc ListMeterConnectionMappings(ListMeterConnectionMappingsRequest) returns (ListMeterConnectionMappingsResponse);
  rpc UpdateMeterConnectionMapping(UpdateMeterConnectionMappingRequest) returns (MeterConnectionMappingResponse);
  rpc DeleteMeterConnectionMapping(DeleteMeterConnectionMappingRequest) returns (google.protobuf.Empty);
}

message CreateMeterConnectionMappingRequest {
  int32 rel_id = 1;
  int32 meter_id = 2;
  int32 connection_id = 3;
  int32 meter_use_category = 4; // ParameterValue ID for Meter Use Category
  bool bidirectional_ind = 5;
  optional string meter_billing_mode = 6;
  int32 meter_status_id = 7;
  optional google.protobuf.Timestamp faulty_date = 8;
  optional google.protobuf.Timestamp rectification_date = 9;
  int32 change_reason = 10;
  google.protobuf.Timestamp effective_start_ts = 11;
  optional google.protobuf.Timestamp effective_end_ts = 12;
  optional bool is_active = 13;
  optional int32 created_by = 14;
  optional int32 sort_priority = 15;
  optional bool is_meter_reading_mandatory = 16;
}

message UpdateMeterConnectionMappingRequest {
  int32 rel_id = 1;
  int32 meter_id = 2;
  int32 connection_id = 3;
  int32 meter_use_category = 4;
  bool bidirectional_ind = 5;
  optional string meter_billing_mode = 6;
  int32 meter_status_id = 7;
  optional google.protobuf.Timestamp faulty_date = 8;
  optional google.protobuf.Timestamp rectification_date = 9;
  int32 change_reason = 10;
  google.protobuf.Timestamp effective_start_ts = 11;
  optional google.protobuf.Timestamp effective_end_ts = 12;
  optional bool is_active = 13;
  optional int32 updated_by = 14;
  optional int32 sort_priority = 15;
  optional bool is_meter_reading_mandatory = 16;
}

message GetMeterConnectionMappingRequest {
  int32 rel_id = 1;
}

message GetMeterConnectionMappingByConnectionIdRequest {
  int32 connection_id = 1;
}

message DeleteMeterConnectionMappingRequest {
  int32 rel_id = 1;
}

message ListMeterConnectionMappingsRequest {}

message ListMeterConnectionMappingsResponse {
  repeated MeterConnectionMappingResponse meter_connection_mappings = 1;
}

message MeterConnectionMappingResponse {
  int32 version_id = 1;
  int32 rel_id = 2;
  int32 meter_id = 3;
  int32 connection_id = 4;
  parameters.ParameterValueProto meter_use_category = 5;
  bool bidirectional_ind = 6;
  optional string meter_billing_mode = 7;
  parameters.ParameterValueProto meter_status = 8;
  optional google.protobuf.Timestamp faulty_date = 9;
  optional google.protobuf.Timestamp rectification_date = 10;
  parameters.ParameterValueProto change_reason = 11;
  google.protobuf.Timestamp effective_start_ts = 12;
  optional google.protobuf.Timestamp effective_end_ts = 13;
  optional bool is_active = 14;
  google.protobuf.Timestamp created_ts = 15;
  optional google.protobuf.Timestamp updated_ts = 16;
  optional int32 created_by = 17;
  optional int32 updated_by = 18;
  optional int32 sort_priority = 19;
  optional bool is_meter_reading_mandatory = 20;
}