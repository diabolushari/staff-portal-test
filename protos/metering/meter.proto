syntax = "proto3";

package com.kseb.consumerservice.proto.metering;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option php_namespace = "Proto\\Consumers";
option php_metadata_namespace = "GPBMetadata";


option java_package = "com.kseb.consumerservice.proto.metering";
option java_multiple_files = true;
option java_outer_classname = "MeterProto";

service MeterService {
  rpc CreateMeter(CreateMeterRequest) returns (MeterResponse);
  rpc GetMeter(GetMeterRequest) returns (MeterResponse);
  rpc ListMeters(ListMetersRequest) returns (ListMetersResponse);
  rpc UpdateMeter(UpdateMeterRequest) returns (MeterResponse);
  rpc DeleteMeter(DeleteMeterRequest) returns (google.protobuf.Empty);
}

message ListMetersResponse {
  repeated MeterResponse meters = 1;
}

message GetMeterRequest {
  int32 meter_id = 1;
}

message ListMetersRequest {}

import "parameters/parameter-value.proto";

message CreateMeterRequest {
  string meter_serial = 2;
  int32 ownership_type_id = 3;        // CORRECT: Generates getOwnershipTypeId()
  int32 meter_make_id = 4;              // CORRECT: Generates getMeterMakeId()
  int32 meter_type_id = 5;              // CORRECT: Generates getMeterTypeId()
  int32 meter_category_id = 6;        // CORRECT: Generates getMeterCategoryId()
  int32 accuracy_class_id = 7;        // CORRECT: Generates getAccuracyClassId()
  int32 dialing_factor = 8;
  string company_seal_num = 9;
  int32 digit_count = 10;
  float voltage_meter_ratio = 11;
  int32 current_meter_ratio = 12;
  google.protobuf.Timestamp manufacture_date = 13;
  google.protobuf.Timestamp supply_date = 14;
  int32 meter_unit_id = 15;             // CORRECT: Generates getMeterUnitId()
  int32 meter_reset_type_id = 16;       // CORRECT: Generates getMeterResetTypeId()
  bool smart_meter_ind = 17;
  bool bidirectional_ind = 18;
  int32 created_by = 19;
}

message UpdateMeterRequest {
  int32 meter_id = 1;
  string meter_serial = 2;
  int32 ownership_type_id = 3;        // CORRECT: Generates getOwnershipTypeId()
  int32 meter_make_id = 4;              // CORRECT: Generates getMeterMakeId()
  int32 meter_type_id = 5;              // CORRECT: Generates getMeterTypeId()
  int32 meter_category_id = 6;        // CORRECT: Generates getMeterCategoryId()
  int32 accuracy_class_id = 7;        // CORRECT: Generates getAccuracyClassId()
  int32 dialing_factor = 8;
  string company_seal_num = 9;
  int32 digit_count = 10;
  float voltage_meter_ratio = 11;
  int32 current_meter_ratio = 12;
  google.protobuf.Timestamp manufacture_date = 13;
  google.protobuf.Timestamp supply_date = 14;
  int32 meter_unit_id = 15;             // CORRECT: Generates getMeterUnitId()
  int32 meter_reset_type_id = 16;       // CORRECT: Generates getMeterResetTypeId()
  bool smart_meter_ind = 17;
  bool bidirectional_ind = 18;
  int32 updated_by = 19;
}

message DeleteMeterRequest {
  int32 meter_id = 1;
}

message MeterResponse {
  int32 version_id = 1;
  int32 meter_id = 2;
  string meter_serial = 3;
  parameters.ParameterValueProto ownership_type = 4;
  parameters.ParameterValueProto meter_make = 5;
  parameters.ParameterValueProto meter_type = 6;
  parameters.ParameterValueProto meter_category = 7;
  parameters.ParameterValueProto accuracy_class = 8;
  int32 dialing_factor = 9;
  optional string company_seal_num = 10;
  optional int32 digit_count = 11;
  optional float voltage_meter_ratio = 12;
  optional int32 current_meter_ratio = 13;
  optional google.protobuf.Timestamp manufacture_date = 14;
  optional google.protobuf.Timestamp supply_date = 15;
  parameters.ParameterValueProto meter_unit = 16;
  parameters.ParameterValueProto meter_reset_type = 17;
  bool smart_meter_ind = 18;
  bool bidirectional_ind = 19;
  google.protobuf.Timestamp created_ts = 20;
  google.protobuf.Timestamp updated_ts = 21;
  int32 created_by = 22;
  optional int32 updated_by = 23;
}
