syntax = "proto3";

package com.kseb.consumerservice.proto.metering;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "parameters/parameter-value.proto";

option php_namespace = "Proto\\Consumers";
option php_metadata_namespace = "GPBMetadata";

option java_package = "com.kseb.consumerservice.proto.metering";
option java_multiple_files = true;
option java_outer_classname = "MeterProto";

service MeterService {
  rpc CreateMeter(CreateMeterRequest) returns (google.protobuf.Empty);
  rpc GetMeter(GetMeterRequest) returns (MeterResponse);
  rpc ListMeters(ListMetersRequest) returns (ListMetersResponse);
  rpc UpdateMeter(UpdateMeterRequest) returns (MeterResponse);
  rpc DeleteMeter(DeleteMeterRequest) returns (google.protobuf.Empty);
}

message ListMetersResponse {
  repeated MeterResponse meters = 1;
}

message GetMeterRequest {
  int32 meter_id = 1;
}

message ListMetersRequest {}

message CreateMeterRequest {
  string meter_serial = 1;
  int32 ownership_type_id = 2;
  int32 meter_make_id = 3;
  int32 meter_type_id = 4;
  int32 meter_category_id = 5;
  int32 accuracy_class_id = 6;
  int32 dialing_factor_id = 7;
  string company_seal_num = 8;
  int32 digit_count = 9;
  google.protobuf.Timestamp manufacture_date = 10;
  google.protobuf.Timestamp supply_date = 11;
  int32 meter_unit_id = 12;
  int32 meter_reset_type_id = 13;
  bool smart_meter_ind = 14;
  bool bidirectional_ind = 15;
  int32 created_by = 16;
  int32 meter_phase_id = 17;
  int32 decimal_digit_count = 18;
  float programmable_pt_ratio = 19;
  int32 programmable_ct_ratio = 20;
  float meter_mf = 21;
  int32 warranty_period = 22;
  int32 meter_constant = 23;
  string batch_code = 24;

  // New nullable internal CT/PT ratios (use optional for presence)
  optional int32 internal_ct_primary = 25;
  optional int32 internal_ct_secondary = 26;
  optional int32 internal_pt_primary = 27;
  optional int32 internal_pt_secondary = 28;

  int64 profile_id = 29;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto profile = 30;
}

message UpdateMeterRequest {
  int32 meter_id = 1;
  string meter_serial = 2;
  int32 ownership_type_id = 3;
  int32 meter_make_id = 4;
  int32 meter_type_id = 5;
  int32 meter_category_id = 6;
  int32 accuracy_class_id = 7;
  int32 dialing_factor_id = 8;
  string company_seal_num = 9;
  int32 digit_count = 10;
  google.protobuf.Timestamp manufacture_date = 11;
  google.protobuf.Timestamp supply_date = 12;
  int32 meter_unit_id = 13;
  int32 meter_reset_type_id = 14;
  bool smart_meter_ind = 15;
  bool bidirectional_ind = 16;
  int32 updated_by = 17;
  int32 meter_phase_id = 18;
  int32 decimal_digit_count = 19;
  float programmable_pt_ratio = 20;
  int32 programmable_ct_ratio = 21;
  float meter_mf = 22;
  int32 warranty_period = 23;
  int32 meter_constant = 24;
  string batch_code = 25;

  // New nullable internal CT/PT ratios (use optional for presence)
  optional int32 internal_ct_primary = 26;
  optional int32 internal_ct_secondary = 27;
  optional int32 internal_pt_primary = 28;
  optional int32 internal_pt_secondary = 29;

  // Allow client to set updated_ts if needed; otherwise server sets it
  optional google.protobuf.Timestamp updated_ts = 30;

  int64 profile_id = 31;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto profile = 32;
}

message DeleteMeterRequest {
  int32 meter_id = 1;
}

message MeterResponse {
  int32 version_id = 1;
  int32 meter_id = 2;
  string meter_serial = 3;
  parameters.ParameterValueProto ownership_type = 4;
  parameters.ParameterValueProto meter_make = 5;
  parameters.ParameterValueProto meter_type = 6;
  parameters.ParameterValueProto meter_category = 7;
  parameters.ParameterValueProto accuracy_class = 8;
  parameters.ParameterValueProto dialing_factor = 9;
  optional string company_seal_num = 10;
  optional int32 digit_count = 11;
  optional google.protobuf.Timestamp manufacture_date = 12;
  optional google.protobuf.Timestamp supply_date = 13;
  parameters.ParameterValueProto meter_unit = 14;
  parameters.ParameterValueProto meter_reset_type = 15;
  bool smart_meter_ind = 16;
  bool bidirectional_ind = 17;
  google.protobuf.Timestamp created_ts = 18;
  google.protobuf.Timestamp updated_ts = 19;
  int32 created_by = 20;
  optional int32 updated_by = 21;
  parameters.ParameterValueProto meter_phase = 22;
  optional int32 decimal_digit_count = 23;
  optional float programmable_pt_ratio = 24;
  optional int32 programmable_ct_ratio = 25;
  optional float meter_mf = 26;
  optional int32 warranty_period = 27;
  optional int32 meter_constant = 28;
  optional string batch_code = 29;

  // New: expose internal CT/PT ratios
  optional int32 internal_ct_primary = 30;
  optional int32 internal_ct_secondary = 31;
  optional int32 internal_pt_primary = 32;
  optional int32 internal_pt_secondary = 33;

  int64 profile_id = 34;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto profile = 35;
}

