syntax = "proto3";

package com.kseb.consumerservice.proto.billinggroup;

option php_namespace = "Proto\\Bill";
option php_metadata_namespace = "GPBMetadata";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "billinggroup/billing_group.proto";
import "billinggroup/billing_group_connection_rel.proto";
import "billinggroup/bill.proto";


// --------------------- JOB STATUS MESSAGE ---------------------

message BillGenerationJobStatusMessage {
  BillingGroupMessage billing_group = 1;
  BillMessage bill = 2;
  BillingGroupConnectionRelMessage connection_rel = 3;
}


// --------------------- GET REQUEST ---------------------

message GetBillGenerationJobStatusRequest {
  int32 billing_group_id = 1;
  optional string reading_year_month = 2;    // YYYY-MM
  optional string bill_year_month = 3;       // YYYY-MM
}

message GetBillGenerationJobStatusResponse {
 repeated BillGenerationJobStatusMessage status = 1;
}


// --------------------- LIST REQUEST ---------------------

message ListBillGenerationJobStatusRequest {
  int32 billing_group_id = 1;
  optional string reading_year_month = 2;     // YYYY-MM
  optional string bill_year_month = 3;        // YYYY-MM

  int32 page = 4;
  int32 page_size = 5;
}

message ListBillGenerationJobStatusResponse {
  repeated BillGenerationJobStatusMessage data = 1;
  int64 total_count = 2;
  int32 page = 3;
  int32 page_size = 4;
}


// ---------------------- SERVICE ----------------------

service BillGenerationJobStatusService {
  rpc GetBillGenerationJobStatus (GetBillGenerationJobStatusRequest)
      returns (GetBillGenerationJobStatusResponse);

  rpc ListBillGenerationJobStatus (ListBillGenerationJobStatusRequest)
      returns (ListBillGenerationJobStatusResponse);
}
