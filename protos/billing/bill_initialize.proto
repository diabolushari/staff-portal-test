syntax = "proto3";

package com.kseb.consumerservice.proto.billing;

option php_namespace = "Proto\\Billing";
option php_metadata_namespace = "GPBMetadata";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "billinggroup/bill.proto";

message BillInitializeRequest {
  repeated int32 connection_ids = 1;
  string bill_date = 2;
  google.protobuf.Timestamp bill_month_year = 3;
  google.protobuf.Timestamp reading_month_year = 4;
}

message BillInitializeResponse {
  repeated com.kseb.consumerservice.proto.billinggroup.BillMessage bills = 1;
}

service BillInitializeService {
  rpc InitializeBill(BillInitializeRequest) returns (BillInitializeResponse);
}
