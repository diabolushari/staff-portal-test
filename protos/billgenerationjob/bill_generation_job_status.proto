syntax = "proto3";

package com.kseb.consumerservice.proto.billgenerationjob;

option php_namespace = "Proto\\BillGenerationJob";
option php_metadata_namespace = "GPBMetadata";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "billinggroup/billing_group.proto";
import "billinggroup/billing_group_connection_rel.proto";
import "billinggroup/bill.proto";
import "connections/connections.proto";


// --------------------- JOB STATUS MESSAGE ---------------------

message BillGenerationJobStatusMessage {
  int64 version_id = 1;
  int32 connection_id = 2;
  int32 bill_generation_job_id = 3;
  optional int32 bill_id = 4;
  optional string status = 5;
  optional bool is_exception = 6;
  optional string job_started_ts = 7;
  optional string job_completed_ts = 8;
  optional string exception = 9;
  optional string created_ts = 10;
  optional int32 created_by = 11;
  optional string deleted_ts = 12;
  optional int32 deleted_by = 13;
  optional com.kseb.consumerservice.grpc.connections.ConnectionMessage connection = 14;
  optional com.kseb.consumerservice.proto.billinggroup.BillMessage bill = 15;
  
}


// --------------------- GET REQUEST ---------------------

message GetBillGenerationJobStatusRequest {
  int32 billing_group_id = 1;
  optional string reading_year_month = 2;    // YYYY-MM
  optional string bill_year_month = 3;
  optional google.protobuf.Timestamp initilized_date = 4;
}

message GetBillGenerationJobStatusResponse {
 repeated BillGenerationJobStatusMessage status = 1;
}


// --------------------- LIST REQUEST ---------------------

message ListBillGenerationJobStatusRequest {
  optional int32 billing_group_id = 1;
  optional string reading_year_month = 2;     // YYYY-MM
  optional string bill_year_month = 3;        // YYYY-MM

}

message ListBillGenerationJobStatusResponse {
  repeated BillGenerationJobStatusMessage data = 1;
  int64 total_count = 2;
}

message PaginatedBillGenerationJobStatusRequest {

  int32 page_number = 1;
  int32 page_size = 2;
  optional string search = 3;
  optional string sort_by = 4;          // optional sort field
  optional string sort_direction = 5; 
  optional int32 billing_group_id = 6;
  optional string reading_year_month = 7;
  
}

message PaginatedBillGenerationJobStatusResponse {
  repeated BillGenerationJobStatusMessage data = 1;
  int64 total_count = 2;
  int32 page_number = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}


// ---------------------- SERVICE ----------------------

service BillGenerationJobStatusService {
  rpc GetBillGenerationJobStatus (GetBillGenerationJobStatusRequest)
      returns (GetBillGenerationJobStatusResponse);

  rpc ListBillGenerationJobStatus (ListBillGenerationJobStatusRequest)
      returns (ListBillGenerationJobStatusResponse);

  rpc PaginatedListBillGenerationJobStatus (PaginatedBillGenerationJobStatusRequest)
      returns (PaginatedBillGenerationJobStatusResponse);
}
