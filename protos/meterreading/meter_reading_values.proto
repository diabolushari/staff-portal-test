syntax = "proto3";

package com.kseb.consumerservice.proto.meterreading;

option php_namespace = "Proto\\MeterReadingValues";
option php_metadata_namespace = "GPBMetadata";
option java_multiple_files = true;
option java_package = "com.kseb.consumerservice.proto.meterreading";
option java_outer_classname = "MeterReadingValuesProto";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "parameters/parameter-value.proto";
import "meterreading/metering_profile_parameters.proto";
import "metering/meter.proto";
import "meterreading/meter_reading.proto";

// ---- Entity ----
message MeterReadingValuesMessage {
  int64 meter_reading_values_id = 1;
  int64 parameter_id = 2;
  int64 meter_reading_id = 3;
  com.kseb.consumerservice.proto.meterreading.MeterReadingMessage meter_reading = 4;
  int32 meter_id = 5;
  com.kseb.consumerservice.proto.metering.MeterResponse meter = 6;
  int64 timezone_id = 7;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto timezone = 8;
  double initial_reading = 9;
  double final_reading = 10;
  double difference = 11;
  double value = 12;
  int32 created_by = 13;
  int32 updated_by = 14;
  bool is_active = 15;
  com.kseb.consumerservice.proto.meterreading.MeteringProfileParameterMessage parameter = 16;
}

// ---- Requests/Responses ----
message CreateMeterReadingValuesRequest {
  int64 parameter_id = 1;
  int64 meter_reading_id = 2;
  int32 meter_id = 3;
  int64 timezone_id = 4;
  double initial_reading = 5;
  double final_reading = 6;
  double difference = 7;
  double value = 8;
  int32 created_by = 9;
}
message CreateMeterReadingValuesResponse { MeterReadingValuesMessage reading = 1; }

message UpdateMeterReadingValuesRequest {
  int64 meter_reading_values_id = 1;
  int64 parameter_id = 2;
  int64 meter_reading_id = 3;
  int32 meter_id = 4;
  int64 timezone_id = 5;
  double initial_reading = 6;
  double final_reading = 7;
  double difference = 8;
  double value = 9;
  int32 updated_by = 10;
}
message UpdateMeterReadingValuesResponse { MeterReadingValuesMessage reading = 1; }

message GetMeterReadingValuesRequest {
  int64 meter_reading_values_id = 1;
  optional int32 meter_id = 2;
  optional int32 meter_parameter_id = 3;
  optional int64 timezone_id = 4;
  optional int64 meter_reading_id = 5;
}
message GetMeterReadingValuesResponse { MeterReadingValuesMessage reading = 1; }

message DeleteMeterReadingValuesRequest { int64 meter_reading_values_id = 1; }
message DeleteMeterReadingValuesResponse { bool success = 1; string message = 2; }

message ListMeterReadingValuesRequest {
  int32 page = 1;
  int32 page_size = 2;
  optional string search = 3;
  optional int64 meter_reading_values_id = 4;
  optional int32 meter_id = 5;
  optional int32 meter_parameter_id = 6;
  optional int32 timezone_id = 7;
}
message ListMeterReadingValuesResponse { repeated MeterReadingValuesMessage readings = 1; }

// ---- Service ----
service MeterReadingValuesService {
  rpc CreateMeterReadingValues(CreateMeterReadingValuesRequest) returns (CreateMeterReadingValuesResponse);
  rpc UpdateMeterReadingValues(UpdateMeterReadingValuesRequest) returns (UpdateMeterReadingValuesResponse);
  rpc GetMeterReadingValues(GetMeterReadingValuesRequest) returns (GetMeterReadingValuesResponse);
  rpc DeleteMeterReadingValues(DeleteMeterReadingValuesRequest) returns (DeleteMeterReadingValuesResponse);
  rpc ListMeterReadingValues(ListMeterReadingValuesRequest) returns (ListMeterReadingValuesResponse);
}
