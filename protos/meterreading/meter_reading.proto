syntax = "proto3";

package com.kseb.consumerservice.proto.meterreading;

option php_namespace = "Proto\\MeterReading";
option php_metadata_namespace = "GPBMetadata";


import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "parameters/parameter-value.proto";
import "metering/meter.proto";
import "meterreading/metering_profile_parameters.proto";

message ReadingValueMessage{
  int64 meter_reading_values_id = 1;
  int64 parameter_id = 2;
  int64 meter_reading_id = 3;
  int32 meter_id = 4;
  com.kseb.consumerservice.proto.metering.MeterResponse meter = 5;
  int64 timezone_id = 6;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto timezone = 7;
  double initial_reading = 8;
  double final_reading = 9;
  double difference = 10;
  double mul_value = 11;
  int32 created_by = 12;
  int32 updated_by = 13;
  bool is_active = 14;
  com.kseb.consumerservice.proto.meterreading.MeteringProfileParameterMessage parameter = 15;
}

message ReadingValueFormMessage {
  int64 parameter_id = 1;
  int32 meter_id = 2;
  int64 timezone_id = 3;
  double initial_reading = 4;
  double final_reading = 5;
  double difference = 6;
  double mul_value = 7;
  int32 created_by = 8;
  optional int64 meter_reading_value_id = 9;
}


// ----------- ENTITY MESSAGE ------------
message MeterReadingMessage {
  int64 meter_reading_id = 1;
  int64 connection_id = 2;

  bool single_reading = 3;
  bool multiple_reading = 4;

  int64 anomaly_id = 5;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto anomaly = 6;

  string metering_date = 7;
  string reading_start_date = 8;
  string reading_end_date = 9;
  string faulty_date = 10;


  double voltage_r = 19;
  double voltage_y = 20;
  double voltage_b = 21;

  double current_r = 22;
  double current_y = 23;
  double current_b = 24;

  string remarks = 25;

  int32 created_by = 26;
  int32 updated_by = 27;
  int32 deleted_by = 28;
  bool is_active = 29;
  repeated ReadingValueMessage values = 30;
}
// ----------- REQUEST/RESPONSE MESSAGES ----------

message CtptHealthFormMessage {
  int64 ctpt_id = 1;
  int64 parameter_id = 2;
}
message MeterHealthFormMessage {
  int32 meter_id = 1;
  int64 meter_health_id = 2;
  repeated CtptHealthFormMessage healths = 3;
}

// Create
message CreateMeterReadingRequest {
  int64 connection_id = 1;
  bool single_reading = 2;
  bool multiple_reading = 3;
  int64 anomaly_id = 4;
  string metering_date = 5;
  string reading_start_date = 6;
  string reading_end_date = 7;
  optional string faulty_date = 8;
  double voltage_r = 9;
  double voltage_y = 10;
  double voltage_b = 11;
  double current_r = 12;
  double current_y = 13;
  double current_b = 14;
  string remarks = 15;
  int32 created_by = 16;
  bool is_active = 17;
  repeated ReadingValueFormMessage readings = 18;
  repeated MeterHealthFormMessage meter_healths = 19;
}
message CreateMeterReadingResponse {
  MeterReadingMessage reading = 1;
}

// Update
message UpdateMeterReadingRequest {
  int64 meter_reading_id = 1;
  int64 connection_id = 2;
  bool single_reading = 3;
  bool multiple_reading = 4;
  int64 anomaly_id = 5;
  string metering_date = 6;
  string reading_start_date = 7;
  string reading_end_date = 8;
  string faulty_date = 9;
  double voltage_r = 10;
  double voltage_y = 11;
  double voltage_b = 12;
  double current_r = 13;
  double current_y = 14;
  double current_b = 15;
  string remarks = 16;
  int32 updated_by = 17;
  bool is_active = 18;
  repeated ReadingValueFormMessage readings = 19;
  repeated MeterHealthFormMessage meter_healths = 20;
}
message UpdateMeterReadingResponse {
  MeterReadingMessage reading = 1;
}

// Get
message GetMeterReadingRequest {
  int64 meter_reading_id = 1;
  optional int64 meter_id = 2;
}
message GetMeterReadingResponse {
  MeterReadingMessage reading = 1;
  repeated ReadingValueMessage values = 2;
}

// Delete
message DeleteMeterReadingRequest {
  int64 meter_reading_id = 1;
}
message DeleteMeterReadingResponse {
  bool success = 1;
  string message = 2;
}

// List
message ListMeterReadingRequest {
  int32 page = 1;
  int32 page_size = 2;
  int64 connection_id = 3;
  string search = 4;
  int64 meter_reading_id = 5;
  optional google.protobuf.Timestamp reading_month_year = 6;
}
message ListMeterReadingResponse {
  repeated MeterReadingMessage readings = 1;
}

// Latest
message LatestMeterReadingRequest {
  int64 connection_id = 1;
}
message LatestMeterReadingResponse {
  MeterReadingMessage reading = 1;
  repeated ReadingValueMessage values = 2;
}

message ListMeterReadingPaginatedRequest {
  optional int64 connection_id = 1;
  optional string search = 2;
  int32 page_number = 3;
  int32 page_size = 4;
  optional string sort_by = 5;
  optional string sort_direction = 6;
}

message ListMeterReadingPaginatedResponse {
  repeated MeterReadingMessage readings = 1;
  int64 total_count = 2;
  int32 page_number = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}



// ----------- SERVICE ------------
service MeterReadingService {
  rpc CreateMeterReading (CreateMeterReadingRequest) returns (CreateMeterReadingResponse);
  rpc UpdateMeterReading (UpdateMeterReadingRequest) returns (UpdateMeterReadingResponse);
  rpc GetMeterReading    (GetMeterReadingRequest)    returns (GetMeterReadingResponse);
  rpc DeleteMeterReading (DeleteMeterReadingRequest) returns (DeleteMeterReadingResponse);
  rpc ListMeterReading   (ListMeterReadingRequest)   returns (ListMeterReadingResponse);
  rpc LatestMeterReading  (LatestMeterReadingRequest)  returns (LatestMeterReadingResponse);
  rpc ListMeterReadingPaginated (ListMeterReadingPaginatedRequest) returns (ListMeterReadingPaginatedResponse);
}
