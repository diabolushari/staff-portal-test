syntax = "proto3";

package com.kseb.consumerservice.proto.connections;

option php_namespace = "Proto\\Connections";
option php_metadata_namespace = "GPBMetadata";

import "parameters/parameter-value.proto";

// Connection table
message PurposeInfoMessage {
  int64 id = 1;
  int32 purpose_id = 2;
  int32 tariff_id = 3;
  bool is_non_dps = 4;
  optional bool is_active = 5;
  string effective_start = 6;
  optional string effective_end = 7;
  optional int32 created_by = 8;
  optional int32 updated_by = 9;
  optional int32 deleted_by = 10;
  optional string created_ts = 11;
  optional string updated_ts = 12;
  optional string deleted_ts = 13;
  optional com.kseb.consumerservice.proto.parameters.ParameterValueProto purpose = 14;
  optional com.kseb.consumerservice.proto.parameters.ParameterValueProto tariff = 15;

}

message PurposeInfoFormMessage {
  optional int64 id = 1;
  int32 purpose_id = 2;
  int32 tariff_id = 3;
  bool is_non_dps = 4;
  string effective_start = 5;
  optional string effective_end = 6;
  optional int32 created_by = 7;
  optional int32 updated_by = 8;
}


message GetPurposeInfoRequest{
  int64 id = 1;
}

message GetPurposeInfoResponse {
  PurposeInfoMessage purpose_info = 1;
}


message ListPurposeInfoRequest {
  optional int32 purpose_id = 1;
  optional int32 tariff_id = 2;
  optional string search = 3;
}
message ListPurposeInfoResponse {
  repeated PurposeInfoMessage purpose_infos = 1;
}

message ListPurposeInfoPaginatedRequest {
  int32 page_number = 1;
  int32 page_size = 2;
  optional string sort_by = 3;
  optional string sort_direction = 4;
    optional string search = 5;
  optional int32 purpose_id = 6;
}
message ListPurposeInfoPaginatedResponse {
  repeated PurposeInfoMessage purpose_infos = 1;
  int64 total_count = 2;
  int32 page_number = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}

message DeletePurposeInfoResponse {
  bool success = 1;
  string message = 2;
}

message DeletePurposeInfoRequest {
  int64 id = 1;
  optional int32 deleted_by = 2;
}



// Service definitions
service PurposeInfoService {
  rpc CreatePurposeInfo(PurposeInfoFormMessage) returns (PurposeInfoMessage);
  rpc ListPurposeInfo(ListPurposeInfoRequest) returns (ListPurposeInfoResponse);
  rpc ListPurposeInfoPaginated(ListPurposeInfoPaginatedRequest) returns (ListPurposeInfoPaginatedResponse);
  rpc GetPurposeInfo(GetPurposeInfoRequest) returns (GetPurposeInfoResponse);
  rpc UpdatePurposeInfo(PurposeInfoFormMessage) returns (PurposeInfoMessage);
  rpc DeletePurposeInfo(DeletePurposeInfoRequest) returns (DeletePurposeInfoResponse);
}
