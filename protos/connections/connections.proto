syntax = "proto3";

// ✅ Must match Java package
package com.kseb.consumerservice.grpc.connections;

option php_namespace = "Proto\\Connections";
option php_metadata_namespace = "GPBMetadata";

// Imports
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "parameters/parameter-value.proto";
import "consumers/office.proto";
import "metering/meter_connection_mapping.proto";
import "connections/consumer.proto";
import "meterreading/meter_reading.proto";

// Connection table
message ConnectionMessage {
  int32 version_id = 1;
  int32 connection_id = 2;
  int32 connection_type_id = 3;
  int64 consumer_num = 4;
  int32 connection_status_id = 5;
  string connected_date = 6;
  int32 service_office_code = 7;
  int32 admin_office_code = 8;
  int32 voltage_id = 9;
  double contract_demand_kva_val = 10;
  double connected_load_kw_val = 11;
  int32 tariff_id = 12;
  int32 primary_purpose_id = 13;
  int32 connection_category_id = 14;
  int32 connection_subcategory_id = 15;
  google.protobuf.Struct connection_attribs = 16;
  google.protobuf.Struct purposes_info = 17;
  int32 billing_process_id = 18;
  int32 open_access_type_id = 19;
  int32 metering_type_id = 20;
  google.protobuf.Struct connected_load_info = 21;
  google.protobuf.Struct multi_source_info = 22;
  google.protobuf.Timestamp effective_start = 23;
  google.protobuf.Timestamp effective_end = 24;
  optional bool is_current = 25;
  google.protobuf.Timestamp created_at = 26;
  google.protobuf.Timestamp updated_at = 27;
  int32 created_by = 28;
  int32 updated_by = 29;
  optional string consumer_legacy_code = 30;
  int32 phase_type_id = 31;
  double power_load_kw_val = 32;
  double light_load_kw_val = 33;
  bool othercons_flag = 34;
  string application_no = 35;
  optional string remarks = 36;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto consumer_type = 37;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto connection_type = 38;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto connection_status = 39;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto open_access_type = 40;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto metering_type = 41;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto phase_type = 42;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto voltage = 43;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto connection_category = 44;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto connection_subcategory = 45;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto tariff = 46;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto primary_purpose = 47;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto billing_process = 48;
  optional com.kseb.consumerservice.grpc.consumers.OfficeMessage admin_office = 49;
  optional com.kseb.consumerservice.grpc.consumers.OfficeMessage service_office = 50;
  repeated com.kseb.consumerservice.grpc.connections.ConsumerMessage consumer_profile = 51;
  optional com.kseb.consumerservice.proto.meterreading.MeterReadingMessage latest_meter_reading = 52;
}


message CreateConnectionRequest {
  int32 connection_type_id = 1;
  int32 connection_status_id = 2;
  string connected_date = 3;
  int32 service_office_code = 4;
  int32 admin_office_code = 5;
  int32 voltage_id = 6;
  double contract_demand_kva_val = 7;
  int32 tariff_id = 8;
  int32 primary_purpose_id = 9;
  int32 connection_category_id = 10;
  int32 connection_subcategory_id = 11;
  google.protobuf.Struct connection_attribs = 12;
  google.protobuf.Struct purposes_info = 13;
  int32 billing_process_id = 14;
  int32 open_access_type_id = 15;
  int32 metering_type_id = 16;
  google.protobuf.Struct connected_load_info = 17;
  google.protobuf.Struct multi_source_info = 18;
  int32 created_by = 19;
  int32 updated_by = 20;
  optional string consumer_legacy_code = 21;
  int32 phase_type_id = 22;
  double power_load_kw_val = 23;
  double light_load_kw_val = 24;
  bool othercons_flag = 25;
  string application_no = 26;
  optional string remarks = 27;
  bool power_intensive = 28;
  bool excess_demand = 29;
  int32 no_of_main_meters = 30;
}

message GetConnectionRequest{
  int32 connection_id = 1;
}

message GetConnectionResponse {
  ConnectionMessage connection = 1;
  repeated com.kseb.consumerservice.proto.metering.MeterConnectionMappingResponse meters = 2;
}

message CreateConnectionResponse {
  ConnectionMessage connection = 1;
}


message ListConnectionsRequest {
  int32 page = 1;
  int32 page_size = 2;
  optional string consumer_number = 3;
  optional int32 office_code = 4;               
  optional int32 consumer_type_id = 5;          
  optional int32 primary_purpose_id = 6;
}
message ListConnectionsResponse {
  repeated ConnectionMessage items = 1;
}

message ListConnectionsPaginatedRequest {
  optional string connection_type = 1;
  optional string search = 2;
  optional string consumer_number = 3;
  optional int32 office_code = 4;               
  optional int32 consumer_type_id = 5;          
  optional int32 primary_purpose_id = 6;
  int32 page_number = 7;   
  int32 page_size = 8;
  optional string sort_by = 9;      
  optional string sort_direction = 10;
}
message ListConnectionsPaginatedResponse {
  repeated ConnectionMessage items = 1;
  int64 total_count = 2;
  int32 page_number = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}

// Response message for delete operations
message DeleteResponse {
  bool success = 1;
  string message = 2;
}

// Request messages
message ConnectionRequest {
  int32 connection_id = 1;
  int32 version_id = 2;
}

message ConsumerProfileRequest {
  int32 connection_id = 1;
  int32 version_id = 2;
}

message ConsumerAddressRequest {
  int32 address_id = 1;
}

message ConsumerContactDetailsRequest {
  int32 connection_id = 1;
  int32 version_id = 2;
}

message ConnectionUpdateRequest {
  int32 version_id = 1;
  int32 connection_id = 2;
  int32 connection_status_id = 3;
  string connected_date = 4;
  int32 admin_office_code = 5;
  int32 voltage_id = 6;
  double contract_demand_kva_val = 7;
  double connected_load_kw_val = 8;
  int32 tariff_id = 9;
  int32 primary_purpose_id = 10;
  int32 connection_category_id = 11;
  int32 connection_subcategory_id = 12;
  google.protobuf.Struct connection_attribs = 13;
  google.protobuf.Struct purposes_info = 14;
  int32 billing_process_id = 15;
  int32 open_access_type_id = 16;
  int32 metering_type_id = 17;
  google.protobuf.Struct connected_load_info = 18;
  google.protobuf.Struct multi_source_info = 19;
  int32 updated_by = 20;
  optional string consumer_legacy_code = 21;
  int32 phase_type_id = 22;
  double power_load_kw_val = 23;
  double light_load_kw_val = 24;
  bool othercons_flag = 25;
  string application_no = 26;
  optional string remarks = 27;
}
message ConnectionUpdateResponse {
  ConnectionMessage connection = 1;
}


// Service definitions
service ConnectionService {
  rpc CreateConnection(CreateConnectionRequest) returns (CreateConnectionResponse);
  rpc ListConnections(ListConnectionsRequest) returns (ListConnectionsResponse);
  rpc ListConnectionsPaginated(ListConnectionsPaginatedRequest) returns (ListConnectionsPaginatedResponse);
  rpc GetConnection(GetConnectionRequest) returns (GetConnectionResponse);
  rpc UpdateConnection(ConnectionUpdateRequest) returns (ConnectionUpdateResponse);
  rpc DeleteConnection(ConnectionRequest) returns (DeleteResponse);
}