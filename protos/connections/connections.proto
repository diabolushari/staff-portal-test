syntax = "proto3";

// ✅ Must match Java package
package com.kseb.consumerservice.grpc.connections;

option php_namespace = "Proto\\Connections";
option php_metadata_namespace = "GPBMetadata";

// Imports
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "parameters/parameter-value.proto";
import "consumers/office.proto";
import "metering/meter_connection_mapping.proto";

// Connection table
message ConnectionMessage {
  int32 version_id = 1;
  int32 connection_id = 2;
  int32 connection_type_id = 3;
  int64 consumer_num = 4;
  int32 connection_status_id = 5;
  string connected_date = 6;
  int32 service_office_code = 7;
  int32 admin_office_code = 8;
  int32 voltage_id = 9;
  double contract_demand_kva_val = 10;
  double connected_load_kw_val = 11;
  int32 tariff_id = 12;
  int32 primary_purpose_id = 13;
  int32 connection_category_id = 14;
  int32 connection_subcategory_id = 15;
  google.protobuf.Struct connection_attribs = 16;
  google.protobuf.Struct purposes_info = 17;
  int32 billing_process_id = 18;
  optional bool solar_indicator = 19;
  int32 open_access_type_id = 20;
  int32 metering_type_id = 21;
  int32 renewable_type_id = 22;
  google.protobuf.Struct connected_load_info = 23;
  optional bool multi_source_indicator = 24;
  google.protobuf.Struct multi_source_info = 25;
  optional bool live_indicator = 26;
  google.protobuf.Timestamp effective_start = 27;
  google.protobuf.Timestamp effective_end = 28;
  optional bool is_current = 29;
  google.protobuf.Timestamp created_at = 30;
  google.protobuf.Timestamp updated_at = 31;
  int32 created_by = 32;
  int32 updated_by = 33;
  optional string consumer_legacy_code = 34;
  int32 phase_type_id = 35;
  double power_load_kw_val = 36;
  double light_load_kw_val = 37;
  bool othercons_flag = 38;
  bool cpp_flag = 39;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto consumer_type = 40;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto connection_type = 41;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto connection_status = 42;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto open_access_type = 43;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto metering_type = 44;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto renewable_type = 45;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto phase_type = 46;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto voltage = 47;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto connection_category = 48;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto connection_subcategory = 49;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto tariff = 50;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto primary_purpose = 51;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto billing_process = 52;
  optional com.kseb.consumerservice.grpc.consumers.OfficeMessage admin_office = 53;
  optional com.kseb.consumerservice.grpc.consumers.OfficeMessage service_office = 54;
}


message CreateConnectionRequest {
  int32 connection_type_id = 1;
  int32 connection_status_id = 2;
  string connected_date = 3;
  int32 service_office_code = 4;
  int32 admin_office_code = 5;
  int32 voltage_id = 6;
  double contract_demand_kva_val = 7;
  double connected_load_kw_val = 8;
  int32 tariff_id = 9;
  int32 primary_purpose_id = 10;
  int32 connection_category_id = 11;
  int32 connection_subcategory_id = 12;
  google.protobuf.Struct connection_attribs = 13;
  google.protobuf.Struct purposes_info = 14;
  int32 billing_process_id = 15;
  optional bool solar_indicator = 16;
  int32 open_access_type_id = 17;
  int32 metering_type_id = 18;
  int32 renewable_type_id = 19;
  google.protobuf.Struct connected_load_info = 20;
  optional bool multi_source_indicator = 21;
  google.protobuf.Struct multi_source_info = 22;
  optional bool live_indicator = 23;
  int32 created_by = 24;
  int32 updated_by = 25;
  optional string consumer_legacy_code = 26;
  int32 phase_type_id = 27;
  double power_load_kw_val = 28;
  double light_load_kw_val = 29;
  bool othercons_flag = 30;
  bool cpp_flag = 31;
}

message GetConnectionRequest{
  int32 connection_id = 1;
}

message GetConnectionResponse {
  ConnectionMessage connection = 1;
  repeated com.kseb.consumerservice.proto.metering.MeterConnectionMappingResponse meters = 2;
}

message CreateConnectionResponse {
  ConnectionMessage connection = 1;
}


message ListConnectionsRequest {
  int32 page = 1;
  int32 page_size = 2;
  optional string consumer_number = 3;
  optional int32 office_code = 4;
}
message ListConnectionsResponse {
  repeated ConnectionMessage items = 1;
}

message ListConnectionsPaginatedRequest {
  optional string connection_type = 1;
  optional string search = 2;
  optional string consumer_number = 3;
  optional int32 office_code = 4;
  optional int32 consumer_type_id = 5;
  optional int32 primary_purpose_id = 6;
  int32 page_number = 7;
  int32 page_size = 8;
  optional string sort_by = 9;
  optional string sort_direction = 10;
}

message ListConnectionsPaginatedResponse {
  repeated ConnectionMessage items = 1;
  int64 total_count = 2;
  int32 page_number = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}

// Response message for delete operations
message DeleteResponse {
  bool success = 1;
  string message = 2;
}

// Request messages
message ConnectionRequest {
  int32 connection_id = 1;
  int32 version_id = 2;
}

message ConsumerProfileRequest {
  int32 connection_id = 1;
  int32 version_id = 2;
}

message ConsumerAddressRequest {
  int32 address_id = 1;
}

message ConsumerContactDetailsRequest {
  int32 connection_id = 1;
  int32 version_id = 2;
}

message ConnectionUpdateRequest {
  int32 version_id = 1;
  int32 connection_id = 2;
  int32 connection_status_id = 3;
  string connected_date = 4;
  int32 admin_office_code = 5;
  int32 voltage_id = 6;
  double contract_demand_kva_val = 7;
  double connected_load_kw_val = 8;
  int32 tariff_id = 9;
  int32 primary_purpose_id = 10;
  int32 connection_category_id = 11;
  int32 connection_subcategory_id = 12;
  google.protobuf.Struct connection_attribs = 13;
  google.protobuf.Struct purposes_info = 14;
  int32 billing_process_id = 15;
  optional bool solar_indicator = 16;
  int32 open_access_type_id = 17;
  int32 metering_type_id = 18;
  int32 renewable_type_id = 19;
  google.protobuf.Struct connected_load_info = 20;
  optional bool multi_source_indicator = 21;
  google.protobuf.Struct multi_source_info = 22;
  optional bool live_indicator = 23;
  int32 updated_by = 24;
  optional string consumer_legacy_code = 25;
  int32 phase_type_id = 26;
  double power_load_kw_val = 27;
  double light_load_kw_val = 28;
  bool othercons_flag = 29;
  bool cpp_flag = 30;
}
message ConnectionUpdateResponse {
  ConnectionMessage connection = 1;
}


// Service definitions
service ConnectionService {
  rpc CreateConnection(CreateConnectionRequest) returns (CreateConnectionResponse);
  rpc ListConnections(ListConnectionsRequest) returns (ListConnectionsResponse);
  rpc ListConnectionsPaginated(ListConnectionsPaginatedRequest) returns (ListConnectionsPaginatedResponse);
  rpc GetConnection(GetConnectionRequest) returns (GetConnectionResponse);
  rpc UpdateConnection(ConnectionUpdateRequest) returns (ConnectionUpdateResponse);
  rpc DeleteConnection(ConnectionRequest) returns (DeleteResponse);
}
